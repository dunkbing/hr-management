spring.datasource.url=jdbc:postgresql://localhost:5432/hr_management
spring.datasource.username=postgres
spring.datasource.password=12052003

spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Auto-run schema.sql to fix constraints on startup
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

logging.level.root=WARN
logging.level.haukientruc.hr=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=INFO
logging.level.org.springframework.context=WARN

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=30MB

# Digital signature keystore settings
signing.keystore.path=keystore/hr-signing.p12
signing.keystore.password=changeit
signing.key.alias=hr-signer
